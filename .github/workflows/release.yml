name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - hotfix
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # 1. Bump version. `npm version --workspaces --include-workspace-root`
      # keeps the root and all three workspaces (shared/server/client) in
      # lock-step. --no-git-tag-version because we tag manually below.
      - name: Bump version
        id: version
        run: |
          case "${{ github.event.inputs.release_type }}" in
            major)  bump=major ;;
            minor)  bump=minor ;;
            hotfix) bump=patch ;;
            *) echo "Unknown release_type: ${{ github.event.inputs.release_type }}"; exit 1 ;;
          esac
          npm version "$bump" --workspaces --include-workspace-root --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # 2. Commit and tag
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json shared/package.json server/package.json client/package.json
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD
          git push origin "v${{ steps.version.outputs.version }}"

      # 3. Build and push the Docker image at the new tag
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: hedayati
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            hedayati/kassandra:${{ steps.version.outputs.version }}
            hedayati/kassandra:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Generate release notes + create the GitHub Release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
